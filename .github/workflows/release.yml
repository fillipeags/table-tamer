name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      bump_type: ${{ steps.check.outputs.bump_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for releasable commits
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, will create first release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=patch" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "No commits since last tag"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Skip if last commit is a release commit
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$LAST_MSG" | grep -qE "^chore: release"; then
            echo "Last commit is a release, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if echo "$COMMITS" | grep -qE "^(feat|fix|perf|refactor)(\(.+\))?!:|BREAKING CHANGE:"; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^(feat|fix|perf|refactor|chore|docs)(\(.+\))?:"; then
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "No conventional commits found"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "should_release=true" >> $GITHUB_OUTPUT

  create-release:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release-it (bump + tag + changelog)
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm release -- ${{ needs.check-release.outputs.bump_type }} --ci --no-git.requireCleanWorkingDir
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          # Extract latest changelog section
          NOTES=$(awk '/^## \[/{if(found)exit; found=1} found' CHANGELOG.md)
          gh release create "$TAG" --title "$TAG" --notes "$NOTES" --latest

  build-binaries:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build Electron app
        run: pnpm --filter @table-tamer/app dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            packages/app/out/*.dmg
            packages/app/out/*.zip
            packages/app/out/*.exe
            packages/app/out/*.deb
            packages/app/out/*.AppImage
            packages/app/out/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: [create-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish packages
        run: |
          pnpm --filter @table-tamer/core publish --no-git-checks --access public || true
          pnpm --filter @table-tamer/client publish --no-git-checks --access public || true
          pnpm --filter @table-tamer/react-native publish --no-git-checks --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
